<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platon's Square Race</title>
    <style>
        /* --- ФУЛСКРІН СТИЛІ --- */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            touch-action: none; /* Оптимізація для телефонів: вимикає скрол */
        }

        /* --- ЗАГАЛЬНІ СТИЛІ --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d1a; 
            color: #ffffff;
            font-family: 'Consolas', monospace;
        }

        /* --- КОНТЕЙНЕР ГРИ --- */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: none;
            box-shadow: none;
            background-color: #000000;
            overflow: hidden;
            transition: background-color 0.5s;
        }
        
        .white-arena {
            background-color: #ffffff !important;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5) !important;
        }

        /* --- ЕЛЕМЕНТИ ГРИ (Квадрати, Зброя, Снаряди) --- */
        .player-square {
            position: absolute;
            width: 50px; 
            height: 50px;
            border: 2px solid;
            box-shadow: 0 0 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: box-shadow 0.1s, width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
            z-index: 5; 
            animation: spawn-fade-in 0.5s ease-out;
            cursor: pointer; 
            overflow: visible; 
            background-size: cover;
            background-position: center;
        }
        
        .player-square img.hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .eliminated {
            background-color: rgba(30, 30, 30, 0.8) !important;
            border: 4px dashed #ff0000 !important;
            opacity: 0.7;
        }
        .eliminated .hero-image, .eliminated .player-weapon-icon { 
            display: none;
        }
        .eliminated::after {
            content: "X";
            display: block;
            font-size: 30px;
            line-height: 50px;
            color: #ff0000;
            text-align: center;
        }
        
        .shielded {
            animation: glow-shield 0.2s infinite alternate;
            box-shadow: 0 0 30px 5px rgba(255, 255, 255, 0.8) !important; 
        }

        @keyframes glow-shield {
            from { filter: brightness(1.0); }
            to { filter: brightness(1.2); transform: scale(1.01); }
        }
        
        .wall-block {
            position: absolute;
            background-color: #333333; 
            border: 2px solid #555555;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            z-index: 8; 
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
        }
        .wall-block img { width: 100%; height: 100%; object-fit: cover; }
        
        .breaker-block {
            position: absolute;
            background-color: #cccccc; 
            border: 4px solid #000000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            color: #000000;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            text-shadow: 1px 1px 2px #ffffff;
            z-index: 9; 
            pointer-events: none;
            transition: transform 0.1s;
        }

        .weapon-on-map, .item-on-map {
            position: absolute;
            width: 50px; height: 50px; user-select: none;
            animation: none;
            z-index: 10; 
        }
        .weapon-on-map img, .item-on-map img { width: 100%; height: 100%; filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.7)); }
        @keyframes spawn-fade-in { from { transform: scale(0.1); opacity: 0.1; } to { transform: scale(1); opacity: 1; } }
        
        .player-weapon-icon { 
            position: absolute; 
            width: 120%; 
            height: 120%; 
            top: -10%; 
            right: -10%; 
            z-index: 2; 
        }
        .player-weapon-icon img { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); }
        
        .grenade, .bullet { position: absolute; z-index: 10; }
        .bullet { width: 20px; height: 20px; filter: drop-shadow(0 0 5px #000); }
        .bullet img { width: 100%; height: 100%; filter: drop-shadow(0 0 8px #ff0000); }
        .grenade { width: 30px; height: 30px; border-radius: 50%; box-shadow: 0 0 10px #000; }
        .grenade img { width: 100%; height: 100%; }
        .explosion-gif { position: absolute; width: 150px; height: 150px; z-index: 20; pointer-events: none; }

        /* --- МЕНЮ --- */
        #main-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 50;
        }
        
        #mode-selector {
            margin-bottom: 40px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
        }

        #mode-selector button {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background-color: #3399ff; color: #ffffff;
            border: 3px solid #3399ff; border-radius: 8px; transition: all 0.2s;
        }

        #mode-selector button:hover { background-color: #1a6dcc; transform: scale(1.05); }
        #mode-selector button.active {
            background-color: #ff3366; border-color: #ff3366;
            box-shadow: 0 0 20px #ff3366; transform: scale(1.1);
        }

        #winner-message {
            font-size: 40px; font-weight: bold; text-align: center;
            text-shadow: 0 0 20px #fff; margin-bottom: 40px; color: #33ff99; padding: 0 20px;
        }

        #start-button {
            padding: 20px 40px; font-size: 28px; cursor: pointer;
            background-color: #33ff99; color: #000000; border: 4px solid #33ff99;
            border-radius: 10px; box-shadow: 0 0 30px #33ff99; font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
        }
        #start-button:hover { background-color: #00cc66; transform: scale(1.1); }

        /* --- РЕДАКТОР РІВНІВ --- */
        #editor-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1c1c1c; display: none; z-index: 60; 
        }

        #editor-toolbar {
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            background-color: rgba(0, 0, 0, 0.8); display: flex; align-items: center;
            padding: 0 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 70; gap: 10px; transition: transform 0.3s ease-in-out; 
            overflow-x: auto; box-sizing: border-box;
        }
        
        .editor-fullscreen #editor-toolbar { transform: translateY(-100%); }

        #item-tools { display: flex; gap: 10px; margin-left: 10px; margin-right: auto; }
        
        .toolbar-button {
             padding: 8px 12px; font-size: 16px; cursor: pointer;
             border: 2px solid #ffffff; border-radius: 5px;
             background-color: rgba(255, 255, 255, 0.1); color: #ffffff;
             transition: background-color 0.1s; white-space: nowrap;
        }

        #fullscreen-toggle-button { margin-left: auto; margin-right: 10px; }
        #editor-start-button { margin-right: 0; }

        .toolbar-item {
            width: 40px; height: 40px; border-radius: 5px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 75; flex-shrink: 0; 
            background-color: rgba(51, 153, 255, 0.2); border: 2px dashed #3399ff;
            font-size: 24px; transition: transform 0.1s;
        }
        .toolbar-item:hover { transform: scale(1.05); }
        .toolbar-draggable[draggable="true"] { cursor: grab; border: 2px solid #33ff99; }
        .toolbar-item img { width: 100%; height: 100%; pointer-events: none; }
        
        .editor-placed-item {
            position: absolute; width: 50px; height: 50px; cursor: grab;
            opacity: 1; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); transition: box-shadow 0.1s; z-index: 10;
        }
        .editor-placed-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .editor-placed-item.player-square { z-index: 15; border: 3px dashed #ffffff; }
        .editor-placed-item.item-on-map { z-index: 12; border: 2px solid rgba(0, 0, 0, 0.5); background-color: rgba(255, 255, 255, 0.1); }
        .editor-placed-item.wall-block-editor { z-index: 12; background-color: #333333; border: 2px solid #555555; width: 50px; height: 50px; }
        .editor-placed-item.breaker-block-editor {
            z-index: 12; background-color: #cccccc; border: 4px solid #000000; color: #000000;
            font-weight: bold; display: flex; justify-content: center; align-items: center;
            font-size: 20px; text-shadow: 1px 1px 2px #ffffff;
        }
        .editor-placed-item.dragging { opacity: 0.5; box-shadow: 0 0 25px 5px rgba(255, 255, 255, 0.8); transform: scale(1.1); z-index: 100; }

        #editor-start-button {
            padding: 8px 15px; font-size: 18px; cursor: pointer;
            background-color: #33ff99; color: #000000; border: 3px solid #33ff99;
            border-radius: 8px; box-shadow: 0 0 15px #33ff99; font-weight: bold;
        }

        #editor-back-button {
            padding: 5px 10px; font-size: 16px; cursor: pointer; background-color: #ff3366;
            color: #ffffff; border: 3px solid #ff3366; border-radius: 8px;
        }
        
        /* --- СТИЛІ МЕНЮ КАСТОМІЗАЦІЇ (ВИБІР ГЕРОЯ) --- */
        #player-customization-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        
        #custom-menu-content {
            background-color: #2c2c3e; padding: 30px; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.7); width: 90%; max-width: 600px;
            display: flex; flex-direction: column; align-items: center;
        }

        .heroes-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0;
        }
        
        .hero-option {
            width: 80px; height: 80px; border-radius: 10px; cursor: pointer;
            border: 4px solid transparent; transition: transform 0.1s; overflow: hidden;
            background-color: #000;
        }
        .hero-option img { width: 100%; height: 100%; object-fit: cover; }
        .hero-option:hover { transform: scale(1.1); }
        .hero-option.selected { border-color: #33ff99; box-shadow: 0 0 15px #33ff99; }

        #custom-menu-actions { display: flex; justify-content: center; gap: 15px; width: 100%; }
        #custom-menu-actions button { padding: 10px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #custom-menu-save { background-color: #33ff99; color: #000; border: 2px solid #33ff99; }
        #custom-menu-cancel { background-color: #ff3366; color: #fff; border: 2px solid #ff3366; }

        @media (max-width: 600px) {
            .heroes-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .hero-option { width: 70px; height: 70px; }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="editor-container" style="display:none;">
            <div id="editor-toolbar">
                <button id="editor-back-button" class="toolbar-button">↩️ Меню</button>
                <div id="item-tools"></div>
                <button id="fullscreen-toggle-button" class="toolbar-button">⬜ Full Screen</button>
                <button id="editor-start-button">▶️ ПОЧАТИ</button>
            </div>
            <div id="editor-grid"></div>
        </div>

        <div id="player-customization-menu">
            <div id="custom-menu-content">
                <h2>🐾 Обери Героя</h2>
                <div class="heroes-grid" id="heroes-grid-container"></div>
                <div id="custom-menu-actions">
                    <button id="custom-menu-cancel">Скасувати</button>
                    <button id="custom-menu-save">Спавн</button>
                </div>
            </div>
        </div>

        <div id="main-menu">
            <div id="winner-message" style="display:none;"></div>
            <div id="mode-selector">
                <button id="random-mode-button" class="active">Рандомний Режим</button>
                <button id="custom-mode-button">Кастомний Режим (Редактор)</button>
            </div>
            <button id="start-button">РОЗПОЧАТИ БІЙ</button>
        </div>

        <audio id="sound-gun" src="Gun.mp3" preload="auto"></audio>
        <audio id="sound-bam" src="Bam.mp3" preload="auto"></audio>
        <audio id="sound-death" src="Death.mp3" preload="auto"></audio>
        <audio id="sound-game-over" src="Game over.mp3" preload="auto"></audio>
        <audio id="sound-explode" src="Explode.mp3" preload="auto"></audio>
        <audio id="sound-apple" src="Apple.mp3" preload="auto"></audio>
        <audio id="sound-magic" src="Magic.mp3" preload="auto"></audio>
        <audio id="sound-shield" src="Shield.mp3" preload="auto"></audio> 
    </div>

<script>
    let GAME_WIDTH = window.innerWidth;
    let GAME_HEIGHT = window.innerHeight;
    
    window.addEventListener('resize', () => {
        GAME_WIDTH = window.innerWidth;
        GAME_HEIGHT = window.innerHeight;
    });

    const SQUARE_SIZE_ORIGINAL = 50;
    const SQUARE_SIZE_SMALL = 30; 
    const SQUARE_SIZE_BIG = 70; 
    const SHIELD_DURATION = 20000; 
    const INITIAL_SPEED = 2;
    const PROXIMITY_RADIUS = 200; 
    let nextPlayerId = 7; 
    let isFullscreenMode = false; 

    const MAX_PISTOL_SHOTS = 5;
    const MAX_SPAWN_ATTEMPTS = 50; 

    const WEAPON_TYPES = { 
        KNIFE: 'Knife.png', 
        PISTOL: 'Gun.png', 
        GRENADE: 'Granata.png',
        WHOLE_APPLE: 'Apple.png', 
        BITTEN_APPLE: 'Apple 2.png', 
        FINISH_LINE: 'Finish.png',
        WALL_BLOCK: 'Wall.png', 
        BREAKER_BLOCK: 'Breaker',
        SMALL_POTION: 'Small potion.png', 
        BIG_POTION: 'Big potion.png',     
        SHIELD: 'Shield.png' 
    };
    const WHOLE_APPLE_TYPE = WEAPON_TYPES.WHOLE_APPLE; 
    const BITTEN_APPLE_TYPE = WEAPON_TYPES.BITTEN_APPLE; 
    const FINISH_TYPE = WEAPON_TYPES.FINISH_LINE; 
    const WALL_TYPE = WEAPON_TYPES.WALL_BLOCK; 
    const BREAKER_TYPE = WEAPON_TYPES.BREAKER_BLOCK; 
    const SMALL_POTION_TYPE = WEAPON_TYPES.SMALL_POTION; 
    const BIG_POTION_TYPE = WEAPON_TYPES.BIG_POTION;     
    const SHIELD_TYPE = WEAPON_TYPES.SHIELD; 
    
    const BASE_KNIFE_COUNT = 1;
    const BASE_PISTOL_COUNT = 1; 
    const BASE_GRENADE_COUNT = 1; 
    const WHOLE_APPLE_COUNT = 1; 
    const BITTEN_APPLE_COUNT = 1; 
    const BASE_WALL_COUNT = 8; 
    const SMALL_POTION_COUNT = 1; 
    const BIG_POTION_COUNT = 1;   
    const SHIELD_COUNT = 1; 
    
    const SPAWN_SKIP_CHANCE = 0.20; 

    const BULLET_IMAGE = 'Bullet.png';
    const EXPLOSION_IMAGE = 'Explode.gif';
    const WEAPON_SIZE = 50; 

    const GRENADE_SIZE = 30;
    const GRENADE_SPEED = 10; 
    const GRENADE_FUSE_TIME = 5000; 
    const EXPLOSION_RADIUS = 150; 
    const EXPLOSION_DURATION = 1500; 

    const BULLET_SIZE = 20; 
    const BULLET_SPEED = 8;
    const SHOT_DELAY = 3000; 

    let players = [];
    let weapons = []; 
    let bullets = [];
    let grenades = []; 
    let walls = []; 
    let breakers = []; 
    let gameLoop;
    let isGameOver = false;
    let gameMode = 'random'; 
    let customLevelData = { players: [], weapons: [], walls: [], breakers: [] }; 
    let placedElements = []; 

    // НОВІ ГЕРОЇ ПЛАТОНА
    const PET_HEROES = [
        { id: 1, name: 'Tito', image: 'Tito.png', hex: '#ff3366' },
        { id: 2, name: 'Smartik', image: 'Smartik.png', hex: '#33ff99' },
        { id: 3, name: 'Junior', image: 'Junior.png', hex: '#3399ff' },
        { id: 4, name: 'Fil', image: 'Fil.png', hex: '#ffff66' },
        { id: 5, name: 'Milka', image: 'Milka.png', hex: '#ff9933' },
        { id: 6, name: 'Bark', image: 'Bark.png', hex: '#9933ff' }
    ];
    
    const ITEM_TOOLS_DATA_BASE = [
        { type: 'player', image: 'PlayerIcon.png', dataName: 'Player' }, 
        { type: 'weapon', image: WEAPON_TYPES.KNIFE, dataName: 'Knife' },
        { type: 'weapon', image: WEAPON_TYPES.PISTOL, dataName: 'Gun' },
        { type: 'weapon', image: WEAPON_TYPES.GRENADE, dataName: 'Granata' },
        { type: 'item', image: WHOLE_APPLE_TYPE, dataName: 'WholeApple' },
        { type: 'item', image: BITTEN_APPLE_TYPE, dataName: 'BittenApple' },
        { type: 'item', image: SMALL_POTION_TYPE, dataName: 'SmallPotion' }, 
        { type: 'item', image: BIG_POTION_TYPE, dataName: 'BigPotion' },     
        { type: 'item', image: SHIELD_TYPE, dataName: 'Shield' }, 
        { type: 'item', image: FINISH_TYPE, dataName: 'Finish' },
        { type: 'wall', image: WALL_TYPE, dataName: 'Wall' }, 
        { type: 'breaker', image: BREAKER_TYPE, dataName: 'Breaker' } 
    ];

    const container = document.getElementById('game-container');
    const menuElement = document.getElementById('main-menu');
    const startButton = document.getElementById('start-button');
    const winnerMessageElement = document.getElementById('winner-message');
    const editorContainer = document.getElementById('editor-container');
    const itemTools = document.getElementById('item-tools');
    const editorStartButton = document.getElementById('editor-start-button');
    const editorBackButton = document.getElementById('editor-back-button');
    const randomModeButton = document.getElementById('random-mode-button');
    const customModeButton = document.getElementById('custom-mode-button');
    const fullscreenToggleButton = document.getElementById('fullscreen-toggle-button');
    
    const playerCustomizationMenu = document.getElementById('player-customization-menu');
    const heroesGridContainer = document.getElementById('heroes-grid-container');
    const menuSaveButton = document.getElementById('custom-menu-save');
    const menuCancelButton = document.getElementById('custom-menu-cancel');
    
    let selectedHero = PET_HEROES[0];

    function playSoundEffect(fileName = "") {
        let soundElement = null;
        if (fileName === 'Gun.mp3') { soundElement = document.getElementById('sound-gun');
        } else if (fileName === 'Bam.mp3') { soundElement = document.getElementById('sound-bam');
        } else if (fileName === 'Death.mp3') { soundElement = document.getElementById('sound-death');
        } else if (fileName === 'Game over.mp3') { soundElement = document.getElementById('sound-game-over');
        } else if (fileName === 'Explode.mp3') { soundElement = document.getElementById('sound-explode');
        } else if (fileName === 'Apple.mp3') { soundElement = document.getElementById('sound-apple');
        } else if (fileName === 'Magic.mp3') { soundElement = document.getElementById('sound-magic'); 
        } else if (fileName === 'Shield.mp3') { soundElement = document.getElementById('sound-shield'); } 
        
        if (soundElement) {
            soundElement.currentTime = 0; 
            soundElement.play().catch(e => console.log(`Помилка відтворення звуку ${fileName}.`));
        }
    }

    function distanceSquared(p1, p2) {
        const p1Center = { x: p1.x + p1.width / 2, y: p1.y + p1.height / 2 };
        const p2Center = { x: p2.x + p2.width / 2, y: p2.y + p2.height / 2 };
        return Math.pow(p1Center.x - p2Center.x, 2) + Math.pow(p1Center.y - p2Center.y, 2);
    }
    
    function checkCollision(obj1, obj2) {
        return obj1.x < obj2.x + obj2.width &&
               obj1.x + obj1.width > obj2.x &&
               obj1.y < obj2.y + obj2.height &&
               obj1.y + obj1.height > obj2.y;
    }

    function generateSafePosition(size = SQUARE_SIZE_ORIGINAL, excludeTopArea = false, existingObjects = []) {
        const minY = (!isFullscreenMode && excludeTopArea) ? 100 : 0; 
        
        for (let attempt = 0; attempt < MAX_SPAWN_ATTEMPTS; attempt++) {
            const x = Math.random() * (GAME_WIDTH - size); 
            const y = Math.random() * (GAME_HEIGHT - size - minY) + minY;
            
            const snapX = Math.round(x / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL;
            const snapY = Math.round(y / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL;
            
            const newObj = { x: snapX, y: snapY, width: size, height: size };
            let collisionFound = false;
            
            for (const obj of existingObjects) {
                if (checkCollision(newObj, obj)) { collisionFound = true; break; }
            }
            for (const block of [...walls, ...breakers]) {
                 if (checkCollision(newObj, block)) { collisionFound = true; break; }
            }
            
            if (!collisionFound) { return { x: newObj.x, y: newObj.y }; }
        }
        
        const x = Math.random() * (GAME_WIDTH - size); 
        const y = Math.random() * (GAME_HEIGHT - size - minY) + minY;
        return { x: x, y: y }; 
    }
    
    function generateRandomWeaponPosition() { return generateSafePosition(WEAPON_SIZE, true, [...players, ...weapons]); }
    function generateRandomPlayerPosition(existingPlayers) { return generateSafePosition(SQUARE_SIZE_ORIGINAL, false, [...existingPlayers, ...walls, ...weapons]); }
    function generateRandomWallPosition() { return generateSafePosition(SQUARE_SIZE_ORIGINAL, true, [...walls, ...breakers]); }

    function initializePlayers(mode) {
        players = [];
        nextPlayerId = 1; 

        if (mode === 'random') {
            let tempPlayers = []; 
            PET_HEROES.forEach((hero) => {
                const pos = generateRandomPlayerPosition(tempPlayers); 
                const newPlayer = createPlayerObject(hero.id, hero.name, pos.x, pos.y, hero);
                players.push(newPlayer);
                tempPlayers.push(newPlayer);
            });
            nextPlayerId = 7; 

        } else if (mode === 'custom') {
            customLevelData.players.forEach((data, index) => {
                const heroInfo = PET_HEROES.find(h => h.name === data.name) || PET_HEROES[0];
                players.push(createPlayerObject(heroInfo.id, heroInfo.name, data.x, data.y, heroInfo)); 
            });
            nextPlayerId = players.length + 1; 

            if (players.length < 2) {
                if (editorContainer.style.display !== 'block') {
                    alert("Потрібно розмістити принаймні двох гравців для початку гри!");
                }
                return false; 
            }
        }
        return true; 
    }
    
    function createPlayerObject(id, name, x, y, heroData) {
        const safeX = Math.max(0, Math.min(x, GAME_WIDTH - SQUARE_SIZE_ORIGINAL));
        const safeY = Math.max(0, Math.min(y, GAME_HEIGHT - SQUARE_SIZE_ORIGINAL));
        
        const playerObj = {
            id: id,
            name: name,
            x: safeX,
            y: safeY,
            dx: (Math.random() > 0.5 ? 1 : -1) * INITIAL_SPEED,
            dy: (Math.random() > 0.5 ? 1 : -1) * INITIAL_SPEED,
            alive: true,
            weapon: null,
            _lastShot: 0,
            isLaunchingGrenade: false,
            width: SQUARE_SIZE_ORIGINAL, 
            height: SQUARE_SIZE_ORIGINAL,
            isShielded: false, 
            shieldTimeout: null,
            heroData: heroData,
            element: null, 
            weaponElement: null 
        };
        
        playerObj.element = createPlayerElement(playerObj);
        return playerObj;
    }

    function createPlayerElement(playerObj) {
        const el = document.createElement('div');
        el.className = `player-square`;
        el.style.left = `${playerObj.x}px`;
        el.style.top = `${playerObj.y}px`;
        el.style.width = `${SQUARE_SIZE_ORIGINAL}px`;
        el.style.height = `${SQUARE_SIZE_ORIGINAL}px`;
        
        updatePlayerVisuals(el, playerObj.heroData); 
        container.appendChild(el);
        return el;
    }
    
    function updatePlayerVisuals(element, heroData) {
        element.style.backgroundColor = heroData.hex;
        element.style.borderColor = heroData.hex;
        element.style.boxShadow = `0 0 15px ${heroData.hex}`;
        
        const existingWeaponIcon = element.querySelector('.player-weapon-icon');
        element.innerHTML = ''; 
        
        const img = document.createElement('img');
        img.src = heroData.image;
        img.className = 'hero-image';
        element.appendChild(img);
        
        if (existingWeaponIcon) {
            element.appendChild(existingWeaponIcon); 
        }
    }

    function initializeWalls(mode) {
        walls = [];
        document.querySelectorAll('.wall-block').forEach(el => el.remove()); 
        if (mode === 'random') {
             for (let i = 0; i < BASE_WALL_COUNT; i++) {
                 walls.push(createWallElement(generateRandomWallPosition()));
             }
        } else if (mode === 'custom') {
            customLevelData.walls.forEach(data => {
                walls.push(createWallElement({ x: data.x, y: data.y }));
            });
        }
    }
    
    function createWallElement(position) {
        const el = document.createElement('div');
        el.className = 'wall-block';
        el.style.width = `${SQUARE_SIZE_ORIGINAL}px`;
        el.style.height = `${SQUARE_SIZE_ORIGINAL}px`;
        const img = document.createElement('img');
        img.src = WALL_TYPE; 
        el.appendChild(img);
        el.style.left = `${position.x}px`;
        el.style.top = `${position.y}px`;
        container.appendChild(el);
        return { x: position.x, y: position.y, width: SQUARE_SIZE_ORIGINAL, height: SQUARE_SIZE_ORIGINAL, element: el, type: 'wall' }; 
    }
    
    function initializeBreakers(mode) {
        breakers = [];
        document.querySelectorAll('.breaker-block').forEach(el => el.remove()); 
        if (mode === 'custom') {
            customLevelData.breakers.forEach(data => {
                breakers.push(createBreakerElement({ x: data.x, y: data.y, count: data.count, size: data.size }));
            });
        }
    }
    
    function createBreakerElement(data) {
        const el = document.createElement('div');
        el.className = 'breaker-block';
        el.textContent = data.count;
        el.style.width = `${data.size}px`;
        el.style.height = `${data.size}px`;
        el.style.left = `${data.x}px`;
        el.style.top = `${data.y}px`;
        el.style.fontSize = `${data.size / 2}px`;
        container.appendChild(el);
        return { x: data.x, y: data.y, width: data.size, height: data.size, count: data.count, element: el, type: 'breaker' }; 
    }

    function initializeWeapons(mode) {
        weapons = [];
        document.querySelectorAll('.item-on-map').forEach(el => el.remove()); 
        if (mode === 'random') {
            let typesToSpawn = []; 
            function addItemsWithChance(typePath, count) {
                if (Math.random() > SPAWN_SKIP_CHANCE) { 
                    for (let i = 0; i < count; i++) { typesToSpawn.push(typePath); }
                }
            }
            addItemsWithChance(WEAPON_TYPES.KNIFE, BASE_KNIFE_COUNT);
            addItemsWithChance(WEAPON_TYPES.PISTOL, BASE_PISTOL_COUNT);
            addItemsWithChance(WEAPON_TYPES.GRENADE, BASE_GRENADE_COUNT);
            addItemsWithChance(WHOLE_APPLE_TYPE, WHOLE_APPLE_COUNT);
            addItemsWithChance(BITTEN_APPLE_TYPE, BITTEN_APPLE_COUNT);
            addItemsWithChance(SMALL_POTION_TYPE, SMALL_POTION_COUNT); 
            addItemsWithChance(BIG_POTION_TYPE, BIG_POTION_COUNT);     
            addItemsWithChance(SHIELD_TYPE, SHIELD_COUNT); 
            
            typesToSpawn.forEach(typePath => {
                weapons.push(createWeaponElement(typePath, generateRandomWeaponPosition()));
            });
        } else if (mode === 'custom') {
            customLevelData.weapons.forEach(data => {
                const weaponTypeKey = Object.keys(WEAPON_TYPES).find(key => WEAPON_TYPES[key].includes(data.imageName));
                if (weaponTypeKey) {
                    weapons.push(createWeaponElement(WEAPON_TYPES[weaponTypeKey], { x: data.x, y: data.y }));
                }
            });
        }
    }

    function createWeaponElement(typePath, position) {
        const el = document.createElement('div');
        const isFinish = typePath === FINISH_TYPE; 
        el.className = `item-on-map ${isFinish ? 'finish-item' : 'weapon-item'}`;
        const img = document.createElement('img');
        img.src = typePath; 
        el.appendChild(img);
        el.style.left = `${position.x}px`;
        el.style.top = `${position.y}px`;
        container.appendChild(el);
        return { x: position.x, y: position.y, type: typePath, element: el, available: !isFinish, width: WEAPON_SIZE, height: WEAPON_SIZE }; 
    }
    
    function handleBlockCollision(p1, block) {
        const prevX = p1.x - p1.dx; const prevY = p1.y - p1.dy;
        if (checkCollision(p1, block)) {
            let collisionOccurred = false;
            const prevPlayerBoxX = { x: prevX, y: p1.y, width: p1.width, height: p1.height };
            if (!checkCollision(prevPlayerBoxX, block)) { 
                p1.dx *= -1; p1.x = prevX; collisionOccurred = true;
            } else {
                const prevPlayerBoxY = { x: p1.x, y: prevY, width: p1.width, height: p1.height };
                if (!checkCollision(prevPlayerBoxY, block)) {
                    p1.dy *= -1; p1.y = prevY; collisionOccurred = true;
                } else {
                     p1.x = prevX; p1.y = prevY; p1.dx *= -1; p1.dy *= -1; collisionOccurred = true;
                }
            }
            if (collisionOccurred) { playSoundEffect('Bam.mp3'); return true; }
        }
        return false;
    }
    
    function update() {
        if (isGameOver) return;
        
        players.forEach(p1 => {
            if (!p1.alive) return; 
            p1.x += p1.dx; p1.y += p1.dy;
            let collidedWithBoundary = false;

            if (p1.x < 0 || p1.x + p1.width > GAME_WIDTH) { p1.dx *= -1; p1.x = Math.max(0, Math.min(p1.x, GAME_WIDTH - p1.width)); collidedWithBoundary = true; }
            if (p1.y < 0 || p1.y + p1.height > GAME_HEIGHT) { p1.dy *= -1; p1.y = Math.max(0, Math.min(p1.y, GAME_HEIGHT - p1.height)); collidedWithBoundary = true; }
            if (collidedWithBoundary) { playSoundEffect('Bam.mp3'); }
            
            [...walls, ...breakers].forEach(b => {
                 if (handleBlockCollision(p1, b) && b.type === 'breaker' && b.count > 0) { handleBreakerHit(b); }
            });

            if (p1.weapon && p1.weapon.type === WEAPON_TYPES.GRENADE) { handleGrenadeLaunch(p1); }
            if (p1.weapon && p1.weapon.type === WEAPON_TYPES.PISTOL && p1.weapon.shots > 0) {
                const aliveEnemies = players.filter(p => p.alive && p !== p1);
                if (aliveEnemies.length > 0) {
                    let closestEnemy = null; let minDistance = Infinity;
                    aliveEnemies.forEach(enemy => {
                        const dist = distanceSquared(p1, enemy);
                        if (dist < minDistance) { minDistance = dist; closestEnemy = enemy; }
                    });
                    if (closestEnemy && Math.sqrt(minDistance) < PROXIMITY_RADIUS) { handlePistolShot(p1, closestEnemy); }
                }
            }
            
            players.forEach(p2 => {
                if (!p2.alive || p1 === p2) return;
                if (checkCollision(p1, p2)) { handlePlayerCollision(p1, p2, true); }
            });
            
            weapons.forEach(w => {
                if (checkCollision(p1, w)) {
                    if (w.type === FINISH_TYPE) { handleFinishLine(p1); return; }
                    if (w.available) {
                         if (w.type === SMALL_POTION_TYPE || w.type === BIG_POTION_TYPE) { handlePotionPickup(p1, w); } 
                         else if (w.type === SHIELD_TYPE) { handleShieldPickup(p1, w); } 
                         else if (w.type === WHOLE_APPLE_TYPE) { handleWholeApplePickup(p1, w); } 
                         else if (w.type === BITTEN_APPLE_TYPE) { handleBittenApplePickup(p1, w); } 
                         else { handleWeaponPickup(p1, w); }
                    }
                }
            });
            
            p1.element.style.left = `${p1.x}px`; p1.element.style.top = `${p1.y}px`;
            p1.element.style.width = `${p1.width}px`; p1.element.style.height = `${p1.height}px`;
        });
        
        updateBullets(); updateGrenades(); checkGameOver();
        gameLoop = requestAnimationFrame(update);
    }
    
    function activateShield(player) {
        player.isShielded = true; player.element.classList.add('shielded');
        clearTimeout(player.shieldTimeout); 
        player.shieldTimeout = setTimeout(() => { deactivateShield(player); }, SHIELD_DURATION);
    }
    
    function deactivateShield(player) {
        player.isShielded = false; player.element.classList.remove('shielded');
        clearTimeout(player.shieldTimeout); 
    }
    
    function handleShieldPickup(player, shield) {
        if (!player.isShielded) {
             activateShield(player); shield.element.remove(); shield.available = false;
             weapons = weapons.filter(w => w !== shield); playSoundEffect('Shield.mp3');
        }
    }
    
    function handlePotionPickup(player, potion) {
        let newSize = player.width;
        if (potion.type === SMALL_POTION_TYPE) { newSize = SQUARE_SIZE_SMALL; } 
        else if (potion.type === BIG_POTION_TYPE) { newSize = SQUARE_SIZE_BIG; } 
        changePlayerSize(player, newSize);
        potion.element.remove(); weapons = weapons.filter(w => w !== potion);
        playSoundEffect('Magic.mp3');
    }
    
    function changePlayerSize(player, newSize) {
        player.width = newSize; player.height = newSize;
        player.element.style.width = `${newSize}px`; player.element.style.height = `${newSize}px`;
        player.x = Math.max(0, Math.min(player.x, GAME_WIDTH - newSize));
        player.y = Math.max(0, Math.min(player.y, GAME_HEIGHT - newSize));
    }
    
    function handleBreakerHit(breaker) {
        breaker.count--; breaker.element.textContent = breaker.count;
        breaker.element.style.transform = `scale(${1 + 0.1 * (10 - breaker.count) / 10})`; 
        if (breaker.count <= 0) {
            breaker.element.remove(); breakers = breakers.filter(b => b !== breaker); playSoundEffect('Explode.mp3'); 
        }
    }
    
    function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.dx; b.y += b.dy;
            b.element.style.left = `${b.x}px`; b.element.style.top = `${b.y}px`;

            if (b.x < 0 || b.x > GAME_WIDTH || b.y < 0 || b.y > GAME_HEIGHT) { removeBullet(i); continue; }

            let collisionWithBlock = false;
            [...walls, ...breakers].forEach(block => {
                if (checkCollision(b, block)) {
                    removeBullet(i); collisionWithBlock = true;
                    if (block.type === 'breaker' && block.count > 0) { handleBreakerHit(block); }
                }
            });
            if (collisionWithBlock) continue;

            let hit = false;
            players.forEach(p => {
                if (p.alive && p !== b.shooter && checkCollision(b, p)) {
                    if (p.isShielded) { deactivateShield(p); playSoundEffect('Shield.mp3'); } 
                    else { eliminatePlayer(p, b.shooter); }
                    removeBullet(i); hit = true;
                }
            });
            if (hit) continue;
        }
    }

    function updateGrenades() {
        for (let i = grenades.length - 1; i >= 0; i--) {
            const g = grenades[i];
            g.x += g.dx; g.y += g.dy;
            g.element.style.left = `${g.x}px`; g.element.style.top = `${g.y}px`;
            g.fuseTime -= 16; 

            if (g.x < 0 || g.x + g.width > GAME_WIDTH) { g.dx *= -1; g.x = Math.max(0, Math.min(g.x, GAME_WIDTH - g.width)); }
            if (g.y < 0 || g.y + g.height > GAME_HEIGHT) { g.dy *= -1; g.y = Math.max(0, Math.min(g.y, GAME_HEIGHT - g.height)); }

            [...walls, ...breakers].forEach(block => {
                const prevX = g.x - g.dx; const prevY = g.y - g.dy;
                if (checkCollision(g, block)) {
                    g.x = prevX; g.y = prevY; g.dx *= -1; g.dy *= -1;
                    if (block.type === 'breaker' && block.count > 0) { handleBreakerHit(block); }
                }
            });

            if (g.fuseTime <= 0) { explodeGrenade(g); grenades.splice(i, 1); g.element.remove(); }
        }
    }
    
    function explodeGrenade(grenade) {
        playSoundEffect('Explode.mp3');
        const explosion = document.createElement('img');
        explosion.src = EXPLOSION_IMAGE; explosion.className = 'explosion-gif';
        explosion.style.left = `${grenade.x + grenade.width / 2 - EXPLOSION_RADIUS / 2}px`;
        explosion.style.top = `${grenade.y + grenade.height / 2 - EXPLOSION_RADIUS / 2}px`;
        explosion.style.width = `${EXPLOSION_RADIUS}px`; explosion.style.height = `${EXPLOSION_RADIUS}px`;
        container.appendChild(explosion);
        setTimeout(() => explosion.remove(), EXPLOSION_DURATION);

        const explosionCenter = { x: grenade.x + GRENADE_SIZE / 2, y: grenade.y + GRENADE_SIZE / 2, width: EXPLOSION_RADIUS, height: EXPLOSION_RADIUS };
        
        players.forEach(p => {
            if (p.alive) {
                const pCenter = { x: p.x + p.width / 2, y: p.y + p.height / 2 };
                const distSq = distanceSquared(pCenter, explosionCenter);
                if (Math.sqrt(distSq) < EXPLOSION_RADIUS / 2 + p.width / 2) {
                    if (p.isShielded) { deactivateShield(p); playSoundEffect('Shield.mp3'); } 
                    else { eliminatePlayer(p, grenade.shooter, true); }
                }
            }
        });
        
        for (let i = walls.length - 1; i >= 0; i--) {
            const w = walls[i]; const wCenter = { x: w.x + w.width / 2, y: w.y + w.height / 2 };
             if (Math.sqrt(distanceSquared(wCenter, explosionCenter)) < EXPLOSION_RADIUS / 2 + w.width / 2) {
                 w.element.remove(); walls.splice(i, 1);
             }
        }
        for (let i = breakers.length - 1; i >= 0; i--) {
            const b = breakers[i]; const bCenter = { x: b.x + b.width / 2, y: b.y + b.height / 2 };
             if (Math.sqrt(distanceSquared(bCenter, explosionCenter)) < EXPLOSION_RADIUS / 2 + b.width / 2) {
                 b.element.remove(); breakers.splice(i, 1);
             }
        }
    }
    
    function handleFinishLine(winnerPlayer) {
        if (!isGameOver) { checkGameOver(`${winnerPlayer.name} ПЕРЕМІГ!`); }
    }
    
    function handleWholeApplePickup(originalPlayer, apple) {
        apple.element.remove(); weapons = weapons.filter(w => w !== apple); playSoundEffect('Apple.mp3');
        const clonePos = generateSafePosition(SQUARE_SIZE_ORIGINAL, false, players);
        players.push(createClone(originalPlayer, clonePos.x, clonePos.y));
    }
    
    function handleBittenApplePickup(cloningPlayer, apple) {
        apple.element.remove(); weapons = weapons.filter(w => w !== apple); playSoundEffect('Apple.mp3');
        const aliveEnemies = players.filter(p => p.alive && p !== cloningPlayer);
        if (aliveEnemies.length > 0) {
            let closestEnemy = null; let minDistance = Infinity;
            aliveEnemies.forEach(enemy => {
                const dist = distanceSquared(cloningPlayer, enemy);
                if (dist < minDistance) { minDistance = dist; closestEnemy = enemy; }
            });
            if (closestEnemy) {
                 const clonePos = generateSafePosition(SQUARE_SIZE_ORIGINAL, false, players);
                 players.push(createClone(closestEnemy, clonePos.x, clonePos.y));
                 playSoundEffect('Magic.mp3'); 
            }
        }
    }
    
    function handleWeaponPickup(player, weapon) {
        if (player.weapon) { dropWeapon(player, true); }
        player.weapon = { type: weapon.type };
        if (weapon.type === WEAPON_TYPES.PISTOL) { player.weapon.shots = MAX_PISTOL_SHOTS; player._lastShot = Date.now() - SHOT_DELAY; }

        const weaponIcon = document.createElement('div'); weaponIcon.className = 'player-weapon-icon';
        const img = document.createElement('img'); img.src = weapon.type; weaponIcon.appendChild(img);
        player.element.appendChild(weaponIcon); player.weaponElement = weaponIcon;
        
        weapon.element.remove(); weapon.available = false; weapons = weapons.filter(w => w !== weapon); playSoundEffect('Bam.mp3');
    }

    function dropWeapon(player, respawnRandomly = false) {
        if (player.weaponElement) { player.weaponElement.remove(); player.weaponElement = null; }
        if (player.weapon) {
            const droppedWeaponType = player.weapon.type; player.weapon = null;
            if (respawnRandomly) { weapons.push(createWeaponElement(droppedWeaponType, generateRandomWeaponPosition())); }
        }
    }
    
    function eliminatePlayer(player, eliminator, isExplosion = false) {
        if (!player.alive) return;
        player.alive = false;
        if (player.weapon) {
             weapons.push(createWeaponElement(player.weapon.type, generateRandomWeaponPosition())); dropWeapon(player, false); 
        }
        player.element.classList.add('eliminated'); player.dx = 0; player.dy = 0; playSoundEffect('Death.mp3');

        if (eliminator && eliminator.alive && eliminator !== player) {
            eliminator.dx *= -1.5; eliminator.dy *= -1.5;
            setTimeout(() => { eliminator.dx /= -1.5; eliminator.dy /= -1.5; }, 500); 
        }
        checkGameOver();
    }
    
    function handlePlayerCollision(p1, p2, shouldPlaySound = false) {
        const tempDx = p1.dx; p1.dx = p2.dx; p2.dx = tempDx;
        const tempDy = p1.dy; p1.dy = p2.dy; p2.dy = tempDy;
        
        const center1 = { x: p1.x + p1.width / 2, y: p1.y + p1.height / 2 };
        const center2 = { x: p2.x + p2.width / 2, y: p2.y + p2.height / 2 };
        const angle = Math.atan2(center2.y - center1.y, center2.x - center1.x);
        const overlap = p1.width / 2 + p2.width / 2 - Math.sqrt(distanceSquared(p1, p2));
        
        const moveX = Math.cos(angle) * (overlap / 2 + 1); const moveY = Math.sin(angle) * (overlap / 2 + 1);
        p1.x -= moveX; p1.y -= moveY; p2.x += moveX; p2.y += moveY;
        
        if (shouldPlaySound) { playSoundEffect('Bam.mp3'); }
        
        if (p1.weapon && p1.weapon.type === WEAPON_TYPES.KNIFE) {
             if (p2.isShielded) { deactivateShield(p2); playSoundEffect('Shield.mp3'); } 
             else { eliminatePlayer(p2, p1); dropWeapon(p1, true); }
        } else if (p2.weapon && p2.weapon.type === WEAPON_TYPES.KNIFE) {
             if (p1.isShielded) { deactivateShield(p1); playSoundEffect('Shield.mp3'); } 
             else { eliminatePlayer(p1, p2); dropWeapon(p2, true); }
        }
    }
    
    function handleGrenadeLaunch(shooter) {
        const aliveEnemies = players.filter(p => p.alive && p !== shooter);
        if (aliveEnemies.length === 0) return;
        
        let target = null; let minDistanceSq = PROXIMITY_RADIUS * PROXIMITY_RADIUS;
        aliveEnemies.forEach(enemy => {
             const distSq = distanceSquared(shooter, enemy);
             if (distSq < minDistanceSq) { minDistanceSq = distSq; target = enemy; }
        });
        
        if (target && !shooter.isLaunchingGrenade) {
             shooter.isLaunchingGrenade = true; createGrenade(shooter, target); dropWeapon(shooter, true); 
             setTimeout(() => { shooter.isLaunchingGrenade = false; }, 2000); 
        }
    }
    
    function createGrenade(shooter, target) {
        const g = document.createElement('img'); g.src = WEAPON_TYPES.GRENADE; g.className = 'grenade';
        g.style.width = `${GRENADE_SIZE}px`; g.style.height = `${GRENADE_SIZE}px`; container.appendChild(g);

        const startX = shooter.x + shooter.width / 2 - GRENADE_SIZE / 2; const startY = shooter.y + shooter.height / 2 - GRENADE_SIZE / 2;
        const targetX = target.x + target.width / 2; const targetY = target.y + target.height / 2;
        const angle = Math.atan2(targetY - startY, targetX - startX);
        const dx = Math.cos(angle) * GRENADE_SPEED; const dy = Math.sin(angle) * GRENADE_SPEED;

        grenades.push({ x: startX, y: startY, dx: dx, dy: dy, element: g, shooter: shooter, fuseTime: GRENADE_FUSE_TIME, width: GRENADE_SIZE, height: GRENADE_SIZE });
        playSoundEffect('Gun.mp3'); 
    }

    function removeBullet(index) { bullets[index].element.remove(); bullets.splice(index, 1); }
    
    function handlePistolShot(shooter, target) {
        if (Date.now() - shooter._lastShot > SHOT_DELAY) {
            shooter._lastShot = Date.now(); shooter.weapon.shots--; createBullet(shooter, target);
            if (shooter.weapon.shots <= 0) { dropWeapon(shooter, true); }
        }
    }
    
    function createBullet(shooter, target) {
        const b = document.createElement('img'); b.src = BULLET_IMAGE; b.className = 'bullet';
        b.style.width = `${BULLET_SIZE}px`; b.style.height = `${BULLET_SIZE}px`; container.appendChild(b);

        const startX = shooter.x + shooter.width / 2 - BULLET_SIZE / 2; const startY = shooter.y + shooter.height / 2 - BULLET_SIZE / 2;
        const targetX = target.x + target.width / 2; const targetY = target.y + target.height / 2;
        const angle = Math.atan2(targetY - startY, targetX - startX);
        const dx = Math.cos(angle) * BULLET_SPEED; const dy = Math.sin(angle) * BULLET_SPEED;

        bullets.push({ x: startX, y: startY, dx: dx, dy: dy, element: b, shooter: shooter, width: BULLET_SIZE, height: BULLET_SIZE });
        playSoundEffect('Gun.mp3');
    }
    
    function createClone(original, x, y) {
        const cloneId = nextPlayerId++; const cloneName = `${original.name} (клон)`;
        const cloneObj = createPlayerObject(cloneId, cloneName, x, y, original.heroData);
        changePlayerSize(cloneObj, original.width);
        if (original.isShielded) { activateShield(cloneObj); }
        
        if (original.weapon) {
             const droppedWeaponType = original.weapon.type; let weaponTypeData;
             if (droppedWeaponType === WEAPON_TYPES.PISTOL) { weaponTypeData = { type: WEAPON_TYPES.PISTOL, shots: MAX_PISTOL_SHOTS }; } 
             else if (droppedWeaponType === WEAPON_TYPES.KNIFE) { weaponTypeData = { type: WEAPON_TYPES.KNIFE }; } 
             else if (droppedWeaponType === WEAPON_TYPES.GRENADE) { weaponTypeData = { type: WEAPON_TYPES.GRENADE }; }
            cloneObj.weapon = weaponTypeData;
            const weaponIcon = document.createElement('div'); weaponIcon.className = 'player-weapon-icon';
            const img = document.createElement('img'); img.src = droppedWeaponType; weaponIcon.appendChild(img);
            cloneObj.element.appendChild(weaponIcon); cloneObj.weaponElement = weaponIcon;
        }
        return cloneObj;
    }

    function checkGameOver(customMessage = null) {
        const alivePlayers = players.filter(p => p.alive);
        if (alivePlayers.length <= 1 || customMessage) {
            isGameOver = true; cancelAnimationFrame(gameLoop);
            const message = customMessage || (alivePlayers.length === 1 ? `${alivePlayers[0].name} ПЕРЕМІГ!` : "НІЧИЯ! УСІ ЗАГИНУЛИ.");
            winnerMessageElement.textContent = message; winnerMessageElement.style.display = 'block';
            menuElement.style.display = 'flex'; startButton.textContent = "ЗІГРАТИ ЩЕ РАЗ";
            if (!customMessage) { playSoundEffect('Game over.mp3'); }
        }
    }
    
    function startGame() {
        cancelAnimationFrame(gameLoop); container.classList.add('white-arena');
        document.querySelectorAll('.player-square, .item-on-map, .bullet, .grenade, .wall-block, .breaker-block').forEach(el => el.remove());
        bullets = []; grenades = []; walls = []; breakers = []; weapons = []; 

        if (!initializePlayers(gameMode)) return;

        initializeWalls(gameMode); initializeBreakers(gameMode); initializeWeapons(gameMode);
        winnerMessageElement.style.display = 'none'; menuElement.style.display = 'none'; isGameOver = false;
        gameLoop = requestAnimationFrame(update);
    }
    
    randomModeButton.addEventListener('click', () => {
        gameMode = 'random'; randomModeButton.classList.add('active'); customModeButton.classList.remove('active');
        startButton.textContent = "РОЗПОЧАТИ БІЙ (Рандом)";
    });

    customModeButton.addEventListener('click', () => {
        gameMode = 'custom'; randomModeButton.classList.remove('active'); customModeButton.classList.add('active');
        startButton.textContent = "ПЕРЕЙТИ В РЕДАКТОР";
    });

    startButton.addEventListener('click', () => {
        if (gameMode === 'custom') { showEditor(); } else { startGame(); }
    });

    function showEditor() {
        GAME_WIDTH = window.innerWidth; GAME_HEIGHT = window.innerHeight;
        menuElement.style.display = 'none'; editorContainer.style.display = 'block';
        container.classList.add('white-arena');
        clearEditor(); setupToolbar(); loadCustomDataToEditor(); setFullscreenMode(false); 
        editorContainer.addEventListener('contextmenu', handleEditorContextMenu);
    }
    
    editorBackButton.addEventListener('click', () => {
        editorContainer.style.display = 'none'; menuElement.style.display = 'flex';
        container.classList.remove('white-arena');
        editorContainer.removeEventListener('contextmenu', handleEditorContextMenu);
    });

    editorStartButton.addEventListener('click', () => {
        saveEditorData(); 
        if (customLevelData.players.length < 2) {
            alert("Потрібно розмістити принаймні двох гравців для початку гри! ПКМ або довгий тап видаляє об'єкти.");
            return;
        }
        editorContainer.style.display = 'none';
        editorContainer.removeEventListener('contextmenu', handleEditorContextMenu);
        startGame();
    });
    
    function setFullscreenMode(state) {
        isFullscreenMode = state;
        if (isFullscreenMode) {
            editorContainer.classList.add('editor-fullscreen');
            editorBackButton.style.display = 'none'; editorStartButton.style.display = 'none';
        } else {
            editorContainer.classList.remove('editor-fullscreen');
            editorBackButton.style.display = 'inline-block'; editorStartButton.style.display = 'inline-block';
        }
    }
    
    fullscreenToggleButton.addEventListener('click', () => { setFullscreenMode(!isFullscreenMode); });

    // Підтримка подвійного тапу / кліку для фулскріну
    let lastTapTime = 0;
    editorContainer.addEventListener('touchend', (e) => {
        if (e.target.closest('#editor-toolbar') || e.target.closest('.editor-placed-item')) return;
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        if (tapLength < 500 && tapLength > 0) {
            setFullscreenMode(!isFullscreenMode);
            e.preventDefault();
        }
        lastTapTime = currentTime;
    });

    editorContainer.addEventListener('dblclick', (e) => {
        if (e.target.closest('#editor-toolbar') || e.target.closest('.editor-placed-item')) return;
        setFullscreenMode(!isFullscreenMode);
    });

    function clearEditor() {
        placedElements.forEach(el => el.remove()); placedElements = [];
        customLevelData = { players: [], weapons: [], walls: [], breakers: [] }; 
    }

    function setupToolbar() {
        itemTools.innerHTML = '';
        ITEM_TOOLS_DATA_BASE.forEach(data => {
            const tool = document.createElement('div');
            tool.className = `toolbar-item ${data.type === 'wall' ? 'wall-block-editor' : data.type === 'breaker' ? 'breaker-block-editor' : 'item-on-map'}`; 
            
            if (data.type === 'player') {
                 tool.textContent = '🐾'; tool.style.fontSize = '30px';
                 tool.addEventListener('click', showCustomizationMenu); tool.draggable = false;
            } else {
                 tool.classList.add('toolbar-draggable'); tool.draggable = true; 
                 if (data.image && data.image !== BREAKER_TYPE) {
                    const img = document.createElement('img'); img.src = data.image; tool.appendChild(img);
                 } else if (data.image === BREAKER_TYPE) {
                     tool.textContent = '10'; tool.style.width = '40px'; tool.style.height = '40px'; tool.style.fontSize = '20px';
                 }
                 tool.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', JSON.stringify({ source: 'toolbar', type: data.type, image: data.image, dataName: data.dataName }));
                    e.dataTransfer.effectAllowed = 'copy';
                 });
            }
            tool.setAttribute('data-type', data.type); tool.setAttribute('data-name', data.dataName); tool.setAttribute('data-image', data.image);
            itemTools.appendChild(tool);
        });
    }
    
    function loadCustomDataToEditor() {
        if (customLevelData.players.length > 0) {
            customLevelData.players.forEach(data => { placeItemInEditor('Player', { x: data.x, y: data.y }, { isLoaded: true, name: data.name }); });
        }
        customLevelData.walls.forEach(data => { placeItemInEditor('Wall', { x: data.x, y: data.y }, { isLoaded: true }); });
        customLevelData.breakers.forEach(data => { placeItemInEditor('Breaker', { x: data.x, y: data.y }, { isLoaded: true, count: data.count, size: data.size }); });
        customLevelData.weapons.forEach(data => {
             const weaponTypeKey = Object.keys(WEAPON_TYPES).find(key => WEAPON_TYPES[key].includes(data.imageName));
             let itemDataName = ITEM_TOOLS_DATA_BASE.find(d => d.image === WEAPON_TYPES[weaponTypeKey])?.dataName || 'Item';
             if (weaponTypeKey) { placeItemInEditor(itemDataName, { x: data.x, y: data.y }, { isLoaded: true, imageName: WEAPON_TYPES[weaponTypeKey] }); }
        });
    }

    function placeItemInEditor(dataName, position, initialData = {}) {
        const snapX = Math.round(position.x / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL;
        const snapY = Math.round(position.y / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL;
        
        let type; let colorOrImage;
        const item = document.createElement('div');
        
        if (dataName === 'Player') {
            type = 'player';
            if (placedElements.filter(el => el.getAttribute('data-type') === 'player').length >= 6 && !initialData.isLoaded) {
                 alert("Ви не можете мати більше 6-х гравців."); return null; 
            }
            
            const heroName = initialData.name || selectedHero.name;
            const heroData = PET_HEROES.find(h => h.name === heroName) || PET_HEROES[0];

            item.className = `editor-placed-item player-square`;
            updatePlayerVisuals(item, heroData);
            item.setAttribute('data-name', heroData.name);
            colorOrImage = heroData.image;
            
        } else if (dataName === 'Wall') {
            type = 'wall'; item.className = `editor-placed-item wall-block-editor`; 
            const img = document.createElement('img'); img.src = WALL_TYPE; item.appendChild(img);
            colorOrImage = WALL_TYPE;
        } else if (dataName === 'Breaker') {
            type = 'breaker';
             let breakerCount = initialData.count || 10; let breakerSize = initialData.size || SQUARE_SIZE_ORIGINAL; 
             if (!initialData.isLoaded) {
                 let inputCount = prompt("Введіть початкове число для Ломальщика (від 1 до 99):", breakerCount);
                 breakerCount = parseInt(inputCount) || breakerCount; breakerCount = Math.max(1, Math.min(99, breakerCount));
                 let inputSize = prompt("Введіть розмір Ломальщика в пікселях (кратно 50):", breakerSize);
                 breakerSize = parseInt(inputSize) || breakerSize; breakerSize = Math.max(SQUARE_SIZE_ORIGINAL, Math.min(200, Math.round(breakerSize / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL));
             }
             item.className = `editor-placed-item breaker-block-editor`; item.textContent = breakerCount;
             item.style.width = `${breakerSize}px`; item.style.height = `${breakerSize}px`; item.style.fontSize = `${breakerSize / 2}px`;
             item.setAttribute('data-count', breakerCount); item.setAttribute('data-size', breakerSize); colorOrImage = BREAKER_TYPE;
        } else { 
            type = 'item'; let itemData = ITEM_TOOLS_DATA_BASE.find(d => d.dataName === dataName);
            let imagePath = itemData ? itemData.image : initialData.imageName; 
            if (!imagePath) return null; 
            item.className = `editor-placed-item item-on-map`;
            const img = document.createElement('img'); img.src = imagePath; item.appendChild(img);
            colorOrImage = imagePath; 
        }
        
        item.style.left = `${snapX}px`; item.style.top = `${snapY}px`;
        item.setAttribute('data-image', colorOrImage); item.setAttribute('data-type', type);
        item.setAttribute('draggable', 'true'); 
        
        if(dataName !== 'Player') item.setAttribute('data-name', dataName); 

        editorContainer.appendChild(item); placedElements.push(item);
        makeDraggable(item); 
        return item;
    }

    function makeDraggable(element) {
        element.addEventListener('dragstart', (e) => {
            if (!e.target.classList.contains('editor-placed-item')) { e.preventDefault(); return; }
            e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('dragging');
            
            const itemType = e.target.getAttribute('data-type'); let size = SQUARE_SIZE_ORIGINAL;
            if (itemType === 'breaker') { size = parseFloat(e.target.getAttribute('data-size')) || SQUARE_SIZE_ORIGINAL; }
            
            e.dataTransfer.setData('text/plain', JSON.stringify({ 
                source: 'editor', type: itemType, size: size, dataName: e.target.getAttribute('data-name'),
                data: { x: e.target.style.left, y: e.target.style.top }
            }));
            
            const dragImage = element.cloneNode(true);
            dragImage.style.position = 'absolute'; dragImage.style.top = '-1000px'; dragImage.style.left = '-1000px';
            dragImage.style.opacity = '0.5'; dragImage.style.width = `${size}px`; dragImage.style.height = `${size}px`;
            document.body.appendChild(dragImage);
            e.dataTransfer.setDragImage(dragImage, size / 2, size / 2);
            setTimeout(() => { dragImage.remove(); }, 0); 
            element.style.opacity = '0.01'; 
        });
        element.addEventListener('dragend', (e) => { e.target.classList.remove('dragging'); element.style.opacity = '1'; });
    }
    
    function removePlacedElement(element) { element.remove(); placedElements = placedElements.filter(el => el !== element); }
    
    function handleEditorContextMenu(e) {
        e.preventDefault(); let target = e.target;
        while (target && target !== editorContainer && !target.classList.contains('editor-placed-item')) { target = target.parentNode; }
        if (target && target.classList.contains('editor-placed-item')) {
            if (confirm(`Видалити обраний об'єкт?`)) { removePlacedElement(target); }
        }
    }
    
    editorContainer.addEventListener('dragover', (e) => { 
        e.preventDefault(); 
        const draggingElement = document.querySelector('.dragging');
        if (draggingElement) { e.dataTransfer.dropEffect = 'move'; } else { e.dataTransfer.dropEffect = 'copy'; }
    });

    editorContainer.addEventListener('drop', (e) => {
        e.preventDefault();
        try {
            const dataString = e.dataTransfer.getData('text/plain'); if (!dataString) return; 
            const data = JSON.parse(dataString); const rect = editorContainer.getBoundingClientRect();
            const itemSize = data.size || SQUARE_SIZE_ORIGINAL;
            const x = e.clientX - rect.left - itemSize / 2; const y = e.clientY - rect.top - itemSize / 2;
            const snapX = Math.round(x / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL;
            const snapY = Math.round(y / SQUARE_SIZE_ORIGINAL) * SQUARE_SIZE_ORIGINAL;
            const finalX = Math.max(0, Math.min(snapX, GAME_WIDTH - itemSize));
            const finalY = Math.max(0, Math.min(snapY, GAME_HEIGHT - itemSize));

            if (data.source === 'editor') {
                const draggingElement = document.querySelector('.dragging');
                if (draggingElement) { draggingElement.style.left = `${finalX}px`; draggingElement.style.top = `${finalY}px`; }
            } else if (data.source === 'toolbar') { 
                let itemDataName = data.dataName;
                if (itemDataName !== 'Player') { placeItemInEditor(itemDataName, { x: finalX, y: finalY }, { isLoaded: false, imageName: data.image }); } 
            }
        } catch (error) { console.error("Помилка при обробці drop:", error); }
    });

    function saveEditorData() {
        const savedData = { players: [], weapons: [], walls: [], breakers: [] }; 
        placedElements.forEach(el => {
            const type = el.getAttribute('data-type'); const x = parseFloat(el.style.left); const y = parseFloat(el.style.top);
            if (type === 'player') { savedData.players.push({ name: el.getAttribute('data-name'), x: x, y: y }); } 
            else if (type === 'wall') { savedData.walls.push({ x: x, y: y }); } 
            else if (type === 'breaker') { savedData.breakers.push({ x: x, y: y, count: parseInt(el.getAttribute('data-count')) || 10, size: parseInt(el.getAttribute('data-size')) || SQUARE_SIZE_ORIGINAL }); } 
            else if (type === 'item' || type === 'weapon') { savedData.weapons.push({ imageName: el.getAttribute('data-image').split('/').pop(), x: x, y: y }); }
        });
        customLevelData = savedData;
    }

    function setupCustomizationMenu() {
        heroesGridContainer.innerHTML = '';
        PET_HEROES.forEach((hero, index) => {
            const option = document.createElement('div');
            option.className = `hero-option ${index === 0 ? 'selected' : ''}`;
            const img = document.createElement('img');
            img.src = hero.image;
            option.appendChild(img);
            
            option.addEventListener('click', () => {
                document.querySelectorAll('.hero-option').forEach(el => el.classList.remove('selected'));
                option.classList.add('selected');
                selectedHero = hero;
            });
            heroesGridContainer.appendChild(option);
        });

        menuCancelButton.addEventListener('click', () => playerCustomizationMenu.style.display = 'none');
        menuSaveButton.addEventListener('click', handleSavePlayer);
    }
    
    function showCustomizationMenu() {
        if (placedElements.filter(el => el.getAttribute('data-type') === 'player').length >= 6) {
             alert("Ви не можете мати більше 6-х гравців."); return;
        }
        playerCustomizationMenu.style.display = 'flex';
    }

    function handleSavePlayer() {
        playerCustomizationMenu.style.display = 'none';
        const pos = generateSafePosition(SQUARE_SIZE_ORIGINAL, false, placedElements.filter(el => el.getAttribute('data-type') === 'player')); 
        placeItemInEditor('Player', pos, { name: selectedHero.name });
    }

    window.onload = () => {
        GAME_WIDTH = window.innerWidth; GAME_HEIGHT = window.innerHeight;
        container.classList.remove('white-arena'); randomModeButton.classList.add('active');
        startButton.textContent = "РОЗПОЧАТИ БІЙ (Рандом)";
        setupCustomizationMenu(); 
    };

</script>
</body>
</html>
